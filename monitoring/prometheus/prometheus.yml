global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: "stellar_horizon_exporter"
    static_configs:
      - targets: ["exporter:9090"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Scrapes the event-monitor / indexer metrics endpoint.
  - job_name: "tipjar_event_monitor"
    static_configs:
      - targets: ["event-monitor:8080"]
    metrics_path: /metrics
